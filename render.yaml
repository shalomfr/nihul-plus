services:
  - type: web
    name: matefet
    runtime: node
    rootDir: app
    buildCommand: npm install && npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer

  - type: web
    name: matefet-landing
    runtime: static
    rootDir: landing
    buildCommand: npm install && npm run build
    staticPublishPath: out
    headers:
      # Next.js hashed assets — cache forever (filename changes on rebuild)
      - path: /_next/static/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Everything else — never cache (assets use ?v= query bust)
      - path: /*
        name: Cache-Control
        value: public, no-cache, must-revalidate
